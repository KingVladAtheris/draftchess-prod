services:
  redis:
    image: redis:7-alpine
    container_name: draftchess-redis
    command: redis-server --appendonly yes --appendfsync everysec --notify-keyspace-events KExg --maxmemory 1gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      PGBOUNCER_LISTEN_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 150
      PGBOUNCER_DEFAULT_POOL_SIZE: 30
      PGBOUNCER_AUTH_TYPE: md5
      PGBOUNCER_USER: ${POSTGRES_USER}
      PGBOUNCER_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["6432:6432"]
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SOCKET_URL: http://localhost
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    env_file: .env
    ports: ["3000:3000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  matchmaker:
    build:
      context: .
      dockerfile: apps/matchmaker/Dockerfile
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  socket-server:
    build:
      context: .
      dockerfile: apps/socket-server/Dockerfile
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: draftchess-nginx
    ports: ["80:80"]
    volumes:
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/local.conf
    entrypoint: ["/bin/sh", "-c", "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
    depends_on:
      - web
      - socket-server
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: